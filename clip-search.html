<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="るっかるん Clip検索はトップページへ統合しました。" />
    <meta name="robots" content="noindex,follow" />
    <meta http-equiv="refresh" content="0; url=./" />
    <link rel="canonical" href="https://www.rukalun.mydns.jp/" />
    <title>るっかるん Clip検索へ移動します</title>
    <script>
      const target = new URL("./", window.location.href);
      target.search = window.location.search;
      window.location.replace(target.href);
    </script>
  </head>
  <body>
    <main>
      <h1>るっかるん Clip検索へ移動します</h1>
      <p>自動で移動しない場合は <a href="./">トップページ</a> を開いてください。</p>
    </main>
  </body>
</html>
