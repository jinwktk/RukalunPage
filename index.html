    <style>
      :root {
        color-scheme: light;
        --bg: #fff9fb;
        --paper: #ffffff;
        --surface: #fffefe;
        --ink: #2c2633;
        --muted: #6f6478;
        --line: #eadfe8;
        --pink: #c2487d;
        --pink-soft: #ffe8f0;
        --mint: #e1f8ef;
        --mint-ink: #216f67;
        --sky: #e8f5ff;
        --sky-ink: #305f97;
        --lemon: #fff3c4;
        --lavender: #eee9ff;
        --shadow: 0 10px 24px rgba(62, 42, 67, 0.08);
        --font-cute:
          "UD デジタル 教科書体 NP",
          "UD デジタル 教科書体 N",
          "Hiragino Maru Gothic ProN",
          "BIZ UDPゴシック",
          "BIZ UDPGothic",
          "Yu Gothic",
          "Yu Gothic UI",
          "Meiryo",
          system-ui,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background: linear-gradient(180deg, #fffdf8 0, var(--bg) 460px, #f7fbff 100%);
        color: var(--ink);
        font-family: var(--font-cute);
        letter-spacing: 0;
        line-height: 1.65;
      }

      a {
        color: var(--sky-ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .wrap {
        width: min(1120px, calc(100% - 28px));
        margin: 0 auto;
      }

      .topbar {
        border-bottom: 1px solid rgba(234, 221, 232, 0.86);
        background: rgba(255, 255, 255, 0.92);
      }

      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 16px;
        min-height: 58px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--ink);
        font-weight: 900;
        text-decoration: none;
      }

      .brand-name {
        display: inline-flex;
        align-items: center;
        gap: 2px;
      }

      .site-clip-symbol {
        font-family:
          "Segoe UI Emoji",
          "Apple Color Emoji",
          "Noto Color Emoji",
          sans-serif;
        font-weight: 400;
        line-height: 1;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid #f2b4ce;
        border-radius: 8px;
        background: var(--pink-soft);
        overflow: hidden;
      }

      .brand-icon {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .top-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .top-links a {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        padding: 7px 10px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 800;
        text-decoration: none;
      }

      .hero {
        position: relative;
        display: grid;
        min-height: clamp(310px, 35vw, 430px);
        align-items: center;
        overflow: hidden;
        isolation: isolate;
        background: #fff8fb;
      }

      .hero::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(255, 253, 248, 0.98) 0%, rgba(255, 253, 248, 0.9) 47%, rgba(255, 248, 251, 0.54) 72%, rgba(232, 245, 255, 0.3) 100%),
          linear-gradient(180deg, rgba(255, 248, 251, 0.08), rgba(255, 253, 248, 0.8));
        content: "";
      }

      .hero-image {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
        opacity: 0.72;
        object-fit: cover;
        object-position: center;
      }

      .hero-content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
        gap: 20px;
        align-items: end;
        padding: clamp(32px, 5vw, 58px) 0;
      }

      .hero-copy {
        min-width: 0;
        max-width: 690px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        max-width: 720px;
        margin-top: 0;
        font-size: 3.6rem;
        line-height: 1.12;
        overflow-wrap: anywhere;
      }

      .title-phrase {
        white-space: nowrap;
      }

      .lead {
        max-width: 760px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 1.05rem;
        overflow-wrap: anywhere;
      }

      .lead-line {
        display: inline;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric-card {
        min-height: 92px;
        border: 1px solid rgba(234, 221, 232, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        padding: 12px;
        box-shadow: var(--shadow);
      }

      .metric-card.is-wide {
        grid-column: 1 / -1;
        min-height: 76px;
      }

      .metric-label {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .metric-value {
        display: block;
        margin-top: 4px;
        color: var(--ink);
        font-size: 1.45rem;
        font-weight: 900;
        line-height: 1.2;
        overflow-wrap: anywhere;
      }

      .search-panel {
        position: sticky;
        top: 0;
        z-index: 5;
        border-bottom: 1px solid rgba(234, 221, 232, 0.9);
        background: rgba(255, 249, 251, 0.96);
      }

      .search-shell {
        display: grid;
        gap: 10px;
        padding: 12px 0;
      }

      .search-primary {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: end;
      }

      .keyword-field input {
        min-height: 50px;
        font-size: 1.02rem;
        font-weight: 800;
      }

      .filter-chip {
        align-self: end;
        justify-self: end;
        width: fit-content;
        max-width: 100%;
        border: 1px solid #cde8df;
        border-radius: 999px;
        background: var(--mint);
        color: var(--mint-ink);
        padding: 9px 12px;
        font-size: 0.88rem;
        font-weight: 900;
        line-height: 1.25;
        white-space: nowrap;
      }

      .search-toggle-wrap {
        display: none;
      }

      .search-toggle {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 24px;
        align-items: center;
        column-gap: 10px;
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        padding: 9px 12px;
        text-align: left;
        box-shadow: 0 10px 22px rgba(88, 55, 88, 0.06);
      }

      .search-toggle-copy {
        display: grid;
        min-width: 0;
        gap: 2px;
      }

      .search-toggle-label {
        font-size: 0.95rem;
        font-weight: 900;
      }

      .search-toggle-summary {
        min-width: 0;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .search-toggle-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        color: #b63d74;
        font-size: 0.95rem;
        font-weight: 900;
        line-height: 1;
        transition: transform 0.18s ease;
      }

      .search-toggle[aria-expanded="true"] .search-toggle-icon {
        transform: rotate(180deg);
      }

      .search-grid {
        display: grid;
        grid-template-columns: minmax(160px, 1fr) minmax(160px, 1fr) minmax(150px, 0.8fr) auto;
        gap: 10px;
        align-items: end;
        padding: 0;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      label {
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 900;
      }

      input,
      select {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        outline: none;
        padding: 10px 12px;
      }

      input:focus,
      select:focus,
      button:focus-visible,
      a:focus-visible {
        outline: 3px solid rgba(232, 111, 159, 0.3);
        outline-offset: 2px;
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        padding: 10px 12px;
        font-weight: 900;
        text-decoration: none;
        transition:
          border-color 0.16s ease,
          background 0.16s ease,
          transform 0.16s ease;
      }

      .button.primary {
        border-color: #b93670;
        background: var(--pink);
        color: #fff;
      }

      .button.search-close-button {
        display: none;
        margin-left: auto;
        width: 44px;
        padding: 10px;
        font-size: 1.35rem;
        line-height: 1;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button-icon {
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        object-fit: contain;
      }

      main {
        padding: 24px 0 56px;
      }

      .notice {
        border: 1px solid #f1d6a2;
        border-radius: 8px;
        background: var(--lemon);
        padding: 12px;
        color: #735600;
        font-weight: 800;
      }

      .clip-actions {
        display: grid;
        align-items: stretch;
        grid-template-columns: minmax(0, 20fr) minmax(0, 80fr);
        gap: 0;
        min-height: 44px;
        border: 1px solid #ead6e1;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 8px 18px rgba(88, 55, 88, 0.06);
      }

      .clip-actions > * {
        min-width: 0;
      }

      .clip-action-link-group {
        display: grid;
        grid-template-columns: minmax(0, 60fr) minmax(0, 20fr);
        min-width: 0;
      }

      .clip-action-link-group .clip-link {
        width: 100%;
        border-left: 1px solid #ead6e1;
        border-radius: 0;
      }

      .clip-action-link-group .clip-copy-button {
        border-left: 1px solid #ead6e1;
        border-radius: 0 8px 8px 0;
      }

      .results {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .clip-card {
        display: grid;
        min-height: 214px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.86)),
          var(--paper);
        box-shadow: 0 12px 28px rgba(88, 55, 88, 0.08);
        overflow: hidden;
        transition:
          border-color 0.16s ease,
          transform 0.16s ease,
          box-shadow 0.16s ease;
      }

      .clip-card:hover {
        border-color: #f0bed2;
        transform: translateY(-2px);
      }

      .clip-thumbnail {
        position: relative;
        display: grid;
        aspect-ratio: 16 / 9;
        min-height: 0;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(255, 231, 240, 0.88), rgba(232, 245, 255, 0.9)),
          var(--paper);
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 900;
        overflow: hidden;
      }

      .clip-thumbnail::after {
        position: absolute;
        inset: 0;
        box-shadow: inset 0 -24px 36px rgba(48, 40, 58, 0.08);
        content: "";
        pointer-events: none;
      }

      .clip-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.18s ease;
      }

      .clip-thumbnail.is-loaded img {
        opacity: 1;
      }

      .thumbnail-loader {
        position: absolute;
        z-index: 1;
        width: 30px;
        height: 30px;
        border: 3px solid rgba(232, 111, 159, 0.18);
        border-top-color: #dc5f92;
        border-radius: 999px;
        animation: thumbnail-spin 0.8s linear infinite;
      }

      .clip-thumbnail.is-loaded .thumbnail-loader,
      .clip-thumbnail.has-placeholder .thumbnail-loader {
        display: none;
      }

      .clip-thumbnail-placeholder {
        z-index: 1;
        padding: 10px;
        text-align: center;
      }

      @keyframes thumbnail-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .clip-card:nth-child(4n + 1) .clip-ribbon {
        background: var(--pink-soft);
        color: #a43c70;
      }

      .clip-card:nth-child(4n + 2) .clip-ribbon {
        background: var(--mint);
        color: var(--mint-ink);
      }

      .clip-card:nth-child(4n + 3) .clip-ribbon {
        background: var(--sky);
        color: var(--sky-ink);
      }

      .clip-card:nth-child(4n + 4) .clip-ribbon {
        background: var(--lavender);
        color: #6851a8;
      }

      .clip-ribbon {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 42px;
        padding: 8px 12px;
        font-size: 0.86rem;
        font-weight: 900;
      }

      .clip-ribbon-main {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        gap: 6px;
      }

      .new-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 42px;
        min-height: 22px;
        border: 1px solid rgba(217, 79, 137, 0.3);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: #b63d74;
        padding: 2px 7px;
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1;
      }

      .clip-card-body {
        display: grid;
        gap: 12px;
        padding: 13px;
      }

      .clip-title {
        display: -webkit-box;
        min-height: 3.1em;
        overflow: hidden;
        font-size: 1.02rem;
        font-weight: 900;
        line-height: 1.55;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .clip-meta {
        display: grid;
        gap: 6px;
        justify-items: start;
      }

      .meta-chip {
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        padding: 4px 8px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .meta-chip-creator {
        grid-row: 2;
      }

      .clip-link,
      .clip-favorite-button,
      .clip-copy-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        min-height: 42px;
        min-width: 0;
        border: 0;
        border-radius: 8px;
        background: #fff;
        color: #8f5a78;
        padding: 0;
        font-weight: 900;
        text-decoration: none;
        transition:
          background-color 120ms ease,
          color 120ms ease;
      }

      .clip-favorite-button {
        width: 100%;
        border-radius: 8px 0 0 8px;
        background: #fff6d9;
        color: #8a5a05;
      }

      .clip-action-link-group .clip-link {
        background: #f4efff;
        color: #6f46c7;
      }

      .clip-action-link-group .clip-copy-button {
        background: #e8f8f4;
        color: #20746b;
      }

      .clip-favorite-button:hover {
        background: #ffedb3;
        color: #7c4b00;
      }

      .clip-action-link-group .clip-link:hover {
        background: #eadfff;
        color: #5f35b2;
      }

      .clip-action-link-group .clip-copy-button:hover {
        background: #d4f1ea;
        color: #17665e;
      }

      .clip-link:focus-visible,
      .clip-favorite-button:focus-visible,
      .clip-copy-button:focus-visible {
        outline: 2px solid #e86f9f;
        outline-offset: 2px;
      }

      .button-svg-icon {
        display: block;

    <script>
      const DATA_URL = "clip-search-data.json";
      const CLIP_FAVORITES_STORAGE_KEY = "rukalun.clipSearch.favorites.v1";
      const INITIAL_LIMIT = 24;
      const MORE_STEP = 24;
      const NEW_CLIP_WINDOW_MS = 3 * 24 * 60 * 60 * 1000;
      const SVG_NS = "http://www.w3.org/2000/svg";

      function requireElement(selector) {
        const element = document.querySelector(selector);
        if (!element) throw new Error(`Missing required element: ${selector}`);
        return element;
      }

      const elements = {
        searchPanel: requireElement("#searchPanel"),
        searchPanelToggle: requireElement("#searchPanelToggle"),
        searchPanelToggleLabel: requireElement("#searchPanelToggleLabel"),
        searchPanelSummary: requireElement("#searchPanelSummary"),
        activeFilterChip: requireElement("#activeFilterChip"),
        searchInput: requireElement("#searchInput"),
        creatorFilter: requireElement("#creatorFilter"),
        gameFilter: requireElement("#gameFilter"),
        sortSelect: requireElement("#sortSelect"),
        randomButton: requireElement("#randomButton"),
        clearButton: requireElement("#clearButton"),
        closeSearchButton: requireElement("#closeSearchButton"),
        loadMoreButton: requireElement("#loadMoreButton"),
        loadMoreWrap: requireElement("#loadMoreWrap"),
        results: requireElement("#results"),
        emptyState: requireElement("#emptyState"),
        heroClipCount: requireElement("#heroClipCount"),
        heroVisibleCount: requireElement("#heroVisibleCount"),
        heroClipSyncedAt: requireElement("#heroClipSyncedAt"),
        notice: requireElement("#notice"),
      };

      const initialQuery = new URLSearchParams(window.location.search).get("q");
      if (initialQuery) {
        elements.searchInput.value = initialQuery;
      }

      let allClips = [];
      let filteredClips = [];
      let visibleLimit = INITIAL_LIMIT;
      let favoriteClips = loadFavoriteClips();
      let dataLoadState = "loading";
      let lastRandomSearchValue = "";
      let lastRandomClipId = "";

      function normalizeText(value) {
        return String(value ?? "")
          .normalize("NFKC")
          .toLocaleLowerCase("ja-JP")
          .trim()
          .replace(/\s+/g, " ");
      }

      function formatDate(value) {
        if (!value) return "日付不明";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "日付不明";
        return new Intl.DateTimeFormat("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(date);
      }

      function formatDateTimeWithSeconds(value) {
        if (!value) return "日時不明";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "日時不明";
        const parts = new Intl.DateTimeFormat("ja-JP", {
          timeZone: "Asia/Tokyo",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        })
          .formatToParts(date)
          .reduce((acc, part) => {
            acc[part.type] = part.value;
            return acc;
          }, {});
        return `${parts.year}/${parts.month}/${parts.day} ${parts.hour}:${parts.minute}:${parts.second} JST`;
      }

      function formatViews(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "再生数不明";
        return `${value.toLocaleString("ja-JP")} views`;
      }

      function isNewClip(clip) {
        const createdAt = new Date(clip?.createdAt ?? "").getTime();
        if (!Number.isFinite(createdAt)) return false;
        const ageMs = Date.now() - createdAt;
        return ageMs >= 0 && ageMs < NEW_CLIP_WINDOW_MS;
      }

      function loadFavoriteClips() {
        try {
          const raw = localStorage.getItem(CLIP_FAVORITES_STORAGE_KEY);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};

          return Object.fromEntries(
            Object.entries(parsed).filter((entry) => typeof entry[0] === "string" && Number.isFinite(entry[1]))
          );
        } catch {
          return {};
        }
      }

      function saveFavoriteClips() {
        try {
          localStorage.setItem(CLIP_FAVORITES_STORAGE_KEY, JSON.stringify(favoriteClips));
        } catch {
          setNotice("お気に入りをブラウザに保存できませんでした。");
        }
      }

      function isFavoriteClip(clip) {
        return Boolean(clip?.id && favoriteClips[clip.id]);
      }

      function toggleFavoriteClip(clip) {
        if (!clip?.id) return;
        if (isFavoriteClip(clip)) {
          delete favoriteClips[clip.id];
        } else {
          favoriteClips[clip.id] = Date.now();
        }
        saveFavoriteClips();
        render();
      }

      function isSafeTwitchClipUrl(url) {
        try {
          const parsed = new URL(url);
          return (
            parsed.protocol === "https:" &&
            (parsed.hostname === "www.twitch.tv" || parsed.hostname === "clips.twitch.tv")
          );
        } catch {
          return false;
        }
      }

      function getSafeClipUrl(clip) {
        return isSafeTwitchClipUrl(clip?.url) ? clip.url : "https://www.twitch.tv/rukalun";
      }

      async function copyTextToClipboard(text) {
        if (navigator.clipboard?.writeText && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "fixed";
        textArea.style.top = "-1000px";
        textArea.style.opacity = "0";
        document.body.append(textArea);
        textArea.select();
        const copied = document.execCommand("copy");
        textArea.remove();
        if (!copied) throw new Error("Copy command failed");
      }

      function showCopyFeedback(button) {
        button.classList.add("is-copied");
        button.dataset.copyStatus = "コピーしました";
        button.setAttribute("aria-label", "Twitch URLをコピーしました");
        window.setTimeout(() => {
          button.classList.remove("is-copied");
          delete button.dataset.copyStatus;
          button.setAttribute("aria-label", "Twitch URLをコピー");
        }, 1800);
      }

      async function copyClipUrl(clip, button) {
        try {
          await copyTextToClipboard(getSafeClipUrl(clip));
          showCopyFeedback(button);
        } catch {
          setNotice("Twitch URLをコピーできませんでした。Twitchで開いてからコピーしてください。");
        }
      }

      function isSafeImageUrl(url) {
        try {
          const parsed = new URL(url);
          return parsed.protocol === "https:";
        } catch {
          return false;
        }
      }

      function toLightThumbnailUrl(url) {
        if (!isSafeImageUrl(url)) return "";
        return String(url).replace("-480x272.", "-320x180.");
      }

      function setNotice(message) {
        if (!message) {
          elements.notice.hidden = true;
          elements.notice.textContent = "";
          return;
        }
        elements.notice.hidden = false;
        elements.notice.textContent = message;
      }

      function createSvgIcon(className) {
        const icon = document.createElementNS(SVG_NS, "svg");
        icon.setAttribute("class", `button-svg-icon ${className}`);
        icon.setAttribute("viewBox", "0 0 24 24");
        icon.setAttribute("aria-hidden", "true");
        icon.setAttribute("focusable", "false");
        return icon;
      }

      function createSvgPath(className, pathData) {
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("class", className);
        path.setAttribute("d", pathData);
        return path;
      }

      function createFavoriteIcon() {
        const icon = createSvgIcon("favorite-icon");
        icon.append(
          createSvgPath(
            "favorite-heart",
            "M12 20.5s-7.5-4.2-9.3-9C1.35 7.9 3.55 5 6.9 5c1.9 0 3.25.95 4.1 2.2C11.85 5.95 13.2 5 15.1 5c3.35 0 5.55 2.9 4.2 6.5-1.8 4.8-7.3 9-7.3 9Z"
          )
        );
        return icon;
      }

      function createVideoIcon() {
        const icon = createSvgIcon("video-icon");
        icon.append(
          createSvgPath("video-icon-path", "M4.8 7h9.4c1.1 0 2 .9 2 2v6c0 1.1-.9 2-2 2H4.8c-1.1 0-2-.9-2-2V9c0-1.1.9-2 2-2Z"),
          createSvgPath("video-icon-path", "M16.2 10.2 21 7.8v8.4l-4.8-2.4v-3.6Z")
        );
        return icon;
      }

      function buildCreatorOptions(clips) {
        const creatorCounts = clips.reduce((counts, clip) => {
          if (clip.creator) counts.set(clip.creator, (counts.get(clip.creator) ?? 0) + 1);
          return counts;
        }, new Map());
        const creators = [...creatorCounts.keys()].sort((a, b) => {
          const countDiff = creatorCounts.get(b) - creatorCounts.get(a);
          return countDiff || a.localeCompare(b, "ja-JP");
        });
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = `すべて (${clips.length.toLocaleString("ja-JP")})`;
        elements.creatorFilter.replaceChildren(defaultOption);
        for (const creator of creators) {
          const option = document.createElement("option");
          option.value = creator;
          option.textContent = `${creator} (${creatorCounts.get(creator).toLocaleString("ja-JP")})`;
          elements.creatorFilter.append(option);
        }
      }

      function buildGameOptions(clips) {
        const gameCounts = clips.reduce((counts, clip) => {
          if (clip.gameName) counts.set(clip.gameName, (counts.get(clip.gameName) ?? 0) + 1);
          return counts;
        }, new Map());
        const games = [...gameCounts.keys()].sort((a, b) => {
          const countDiff = gameCounts.get(b) - gameCounts.get(a);
          return countDiff || a.localeCompare(b, "ja-JP");
        });
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = `すべて (${clips.length.toLocaleString("ja-JP")})`;
        elements.gameFilter.replaceChildren(defaultOption);
        for (const game of games) {
          const option = document.createElement("option");
          option.value = game;
          option.textContent = `${game} (${gameCounts.get(game).toLocaleString("ja-JP")})`;
          elements.gameFilter.append(option);
        }
      }

      function sortClips(clips) {
        const sort = elements.sortSelect.value;
        return [...clips].sort((a, b) => {
          if (sort === "oldest") {
            return compareCreatedAtAsc(a, b);
          }
          if (sort === "favorites") {
            const favoriteDiff = Number(isFavoriteClip(b)) - Number(isFavoriteClip(a));
            if (favoriteDiff !== 0) return favoriteDiff;
            const favoriteTimeDiff = (favoriteClips[b.id] ?? 0) - (favoriteClips[a.id] ?? 0);
            if (favoriteTimeDiff !== 0) return favoriteTimeDiff;
            return compareCreatedAtDesc(a, b);
          }
          if (sort === "views") {
            return (b.views ?? -1) - (a.views ?? -1) || compareCreatedAtDesc(a, b);
          }
          if (sort === "title") {
            return a.title.localeCompare(b.title, "ja-JP") || compareCreatedAtDesc(a, b);
          }
          return compareCreatedAtDesc(a, b);
        });
      }

      function compareCreatedAtDesc(a, b) {
        return String(b.createdAt ?? "").localeCompare(String(a.createdAt ?? "")) || a.id.localeCompare(b.id);
      }

      function compareCreatedAtAsc(a, b) {
        return String(a.createdAt ?? "").localeCompare(String(b.createdAt ?? "")) || a.id.localeCompare(b.id);
      }

      function filterClips() {
        const query = normalizeText(elements.searchInput.value);
        const terms = query ? query.split(" ") : [];
        const creator = elements.creatorFilter.value;
        const game = elements.gameFilter.value;

        filteredClips = sortClips(
          allClips.filter((clip) => {
            if (creator && clip.creator !== creator) return false;
            if (game && clip.gameName !== game) return false;
            if (terms.length === 0) return true;

            return terms.every((term) => clip.searchText.includes(term));
          })
        );
      }

      function getSelectedSortLabel() {
        const selected = elements.sortSelect.options[elements.sortSelect.selectedIndex];
        return selected?.textContent?.trim() || "新しい順";
      }

      function hasActiveSearchCondition() {
        return Boolean(
          elements.searchInput.value.trim() ||
            elements.creatorFilter.value ||
            elements.gameFilter.value ||
            elements.sortSelect.value !== "newest"
        );
      }

      function getActiveFilterChipLabel() {
        if (dataLoadState === "failed") return "読み込み失敗";
        if (dataLoadState !== "loaded") return "読み込み中";

        const totalLabel = allClips.length.toLocaleString("ja-JP");
        if (!hasActiveSearchCondition()) return `${totalLabel} clips`;

        const visibleLabel = filteredClips.length.toLocaleString("ja-JP");
        return `${visibleLabel} / ${totalLabel} clips / 条件あり`;
      }

      function updateSearchPanelSummary() {
        const query = elements.searchInput.value.trim();
        const creator = elements.creatorFilter.value || "すべて";
        const game = elements.gameFilter.value || "すべて";
        const queryLabel = query ? `検索: ${query}` : "検索なし";
        const resultLabel =
          dataLoadState === "failed"
            ? "読み込み失敗"
            : dataLoadState === "loaded"
              ? `${filteredClips.length.toLocaleString("ja-JP")} / ${allClips.length.toLocaleString("ja-JP")} clips`
              : "読み込み中";
        const summary = `${queryLabel} / 作成者: ${creator} / ゲーム: ${game} / ${getSelectedSortLabel()}`;
        elements.searchPanelSummary.textContent = `${resultLabel} / ${summary}`;
        elements.activeFilterChip.textContent = getActiveFilterChipLabel();
        elements.activeFilterChip.title = `${resultLabel} / ${summary}`;
      }

      function updateHeroMetrics() {
        const loadingLabel = dataLoadState === "failed" ? "失敗" : "読み込み中";
        elements.heroClipCount.textContent =
          dataLoadState === "loaded" ? allClips.length.toLocaleString("ja-JP") : loadingLabel;
        elements.heroVisibleCount.textContent =
          dataLoadState === "loaded" ? filteredClips.length.toLocaleString("ja-JP") : loadingLabel;
      }

      function setSearchPanelExpanded(expanded) {
        elements.searchPanel.classList.toggle("is-collapsed", !expanded);
        elements.searchPanelToggle.setAttribute("aria-expanded", String(expanded));
        elements.searchPanelToggleLabel.textContent = expanded ? "検索を閉じる" : "検索を開く";
      }

      function renderCard(clip) {
        const card = document.createElement("article");
        card.className = "clip-card";
        card.classList.toggle("is-favorite", isFavoriteClip(clip));

        const ribbon = document.createElement("div");
        ribbon.className = "clip-ribbon";
        const ribbonMain = document.createElement("span");
        ribbonMain.className = "clip-ribbon-main";
        const date = document.createElement("span");
        date.textContent = formatDate(clip.createdAt);
        ribbonMain.append(date);
        if (isNewClip(clip)) {
          const newBadge = document.createElement("span");
          newBadge.className = "new-badge";
          newBadge.setAttribute("aria-label", "新着Clip");
          newBadge.textContent = "NEW";
          ribbonMain.append(newBadge);
        }
        const views = document.createElement("span");
        views.textContent = formatViews(clip.views);
        ribbon.append(ribbonMain, views);

        const thumbnail = document.createElement("div");
        thumbnail.className = "clip-thumbnail";
        thumbnail.setAttribute("data-light-thumbnail", "true");
        const loader = document.createElement("span");
        loader.className = "thumbnail-loader";
        loader.setAttribute("aria-hidden", "true");
        thumbnail.append(loader);
        const lightThumbnailUrl = toLightThumbnailUrl(clip.thumbnailUrl);
        if (lightThumbnailUrl) {
          const image = document.createElement("img");
          image.alt = clip.title ? `${clip.title}のサムネイル` : "Clipサムネイル";
          image.loading = "lazy";
          image.decoding = "async";
          image.addEventListener("load", () => {
            thumbnail.classList.add("is-loaded");
          });
          image.addEventListener("error", () => {
            thumbnail.replaceChildren();
            thumbnail.classList.add("has-placeholder");
            const placeholder = document.createElement("span");
            placeholder.className = "clip-thumbnail-placeholder";
            placeholder.textContent = clip.title ? `${clip.title} / サムネイル準備中` : "サムネイル準備中";
            thumbnail.append(placeholder);
          });
          image.src = lightThumbnailUrl;
          thumbnail.append(image);
        } else {
          thumbnail.classList.add("has-placeholder");
          const placeholder = document.createElement("span");
          placeholder.className = "clip-thumbnail-placeholder";
          placeholder.textContent = clip.title ? `${clip.title} / サムネイル準備中` : "サムネイル準備中";
          thumbnail.append(placeholder);
        }

        const body = document.createElement("div");
        body.className = "clip-card-body";

        const title = document.createElement("h2");
        title.className = "clip-title";
        title.textContent = clip.title || "無題のClip";

        const meta = document.createElement("div");
        meta.className = "clip-meta";
        const creator = document.createElement("span");
        creator.className = "meta-chip meta-chip-creator";
        creator.textContent = clip.creator ? `作成: ${clip.creator}` : "作成者不明";
        const game = document.createElement("span");
        game.className = "meta-chip meta-chip-game";
        game.textContent = clip.gameName ? `ゲーム: ${clip.gameName}` : "ゲーム不明";
        meta.append(game, creator);

        const actions = document.createElement("div");
        actions.className = "clip-actions";

        const favoriteButton = document.createElement("button");
        favoriteButton.className = "clip-favorite-button";
        favoriteButton.type = "button";
        const favoriteLabel = isFavoriteClip(clip) ? "お気に入り済み" : "お気に入りに追加";
        favoriteButton.setAttribute("aria-pressed", String(isFavoriteClip(clip)));
        favoriteButton.setAttribute("aria-label", favoriteLabel);
        favoriteButton.title = favoriteLabel;
        favoriteButton.append(createFavoriteIcon());
        favoriteButton.addEventListener("click", () => toggleFavoriteClip(clip));

        const link = document.createElement("a");
        link.className = "clip-link";
        link.target = "_blank";
        link.rel = "noreferrer";
        link.href = getSafeClipUrl(clip);
        link.title = "Twitchで見る";
        link.setAttribute("aria-label", "Twitchで見る");
        link.append(createVideoIcon());

        const copyButton = document.createElement("button");
        copyButton.className = "clip-copy-button";
        copyButton.type = "button";
        copyButton.title = "Twitch URLをコピー";
        copyButton.setAttribute("aria-label", "Twitch URLをコピー");
        const copyIcon = document.createElement("span");
        copyIcon.className = "copy-icon";
        copyIcon.setAttribute("aria-hidden", "true");
        copyButton.append(copyIcon);
        copyButton.addEventListener("click", () => copyClipUrl(clip, copyButton));

        const linkGroup = document.createElement("div");
        linkGroup.className = "clip-action-link-group";
        linkGroup.append(link, copyButton);

        actions.append(favoriteButton, linkGroup);
        body.append(title, meta, actions);
        card.append(ribbon, thumbnail, body);
        return card;
      }

      function render() {
        filterClips();

        if (dataLoadState === "loading") {
          elements.emptyState.classList.remove("is-visible");
          elements.loadMoreWrap.classList.remove("is-visible");
          updateSearchPanelSummary();
          updateHeroMetrics();
          return;
        }

        const visible = filteredClips.slice(0, visibleLimit);

        elements.results.replaceChildren(...visible.map(renderCard));
        elements.emptyState.classList.toggle(
          "is-visible",
          dataLoadState === "loaded" && filteredClips.length === 0
        );
        elements.loadMoreWrap.classList.toggle("is-visible", filteredClips.length > visibleLimit);
        updateSearchPanelSummary();
        updateHeroMetrics();
      }

      function resetVisibleAndRender() {
        visibleLimit = INITIAL_LIMIT;
        render();
      }

      function clearRandomSelectionState() {
        lastRandomSearchValue = "";
        lastRandomClipId = "";
      }

      function handleSearchInputChange() {
        clearRandomSelectionState();
        resetVisibleAndRender();
      }

      function pickRandomClip() {
        const shouldClearPreviousRandomQuery = Boolean(
          lastRandomSearchValue && elements.searchInput.value === lastRandomSearchValue
        );
        if (shouldClearPreviousRandomQuery) {
          elements.searchInput.value = "";
        }

        filterClips();
        if (filteredClips.length === 0) {
          clearRandomSelectionState();
          render();
          return;
        }
        const randomPool =
          filteredClips.length > 1 && lastRandomClipId
            ? filteredClips.filter((candidate) => candidate.id !== lastRandomClipId)
            : filteredClips;
        const candidates = randomPool.length > 0 ? randomPool : filteredClips;
        const clip = candidates[Math.floor(Math.random() * candidates.length)];
        elements.searchInput.value = clip.title;
        lastRandomSearchValue = clip.title;
        lastRandomClipId = clip.id ?? "";
        visibleLimit = INITIAL_LIMIT;
        render();
      }

      async function loadData() {
        try {
          const response = await fetch(DATA_URL);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          allClips = Array.isArray(data.clips)
            ? data.clips.map((clip) => ({
                ...clip,
                searchText: normalizeText(`${clip.title} ${clip.creator} ${clip.gameName}`),
              }))
            : [];
          dataLoadState = "loaded";
          buildCreatorOptions(allClips);
          buildGameOptions(allClips);
          const recentSyncedAt = data.clipSync?.recentSyncedAt ?? null;
          elements.heroClipSyncedAt.textContent = recentSyncedAt
            ? formatDateTimeWithSeconds(recentSyncedAt)
            : "未記録";
          setNotice(allClips.length === 0 ? "Clipデータがまだありません。しばらくしてから再読み込みしてください。" : "");
          render();
        } catch (error) {
          allClips = [];
          filteredClips = [];
          dataLoadState = "failed";
          elements.heroClipCount.textContent = "失敗";
          elements.heroVisibleCount.textContent = "失敗";
          elements.heroClipSyncedAt.textContent = "未記録";
          elements.activeFilterChip.textContent = "Clipデータを読み込めませんでした";
          setNotice("Clipデータを読み込めませんでした。しばらくしてから再読み込みしてください。");
          render();
        }
      }

      function scheduleDataLoad() {
        const runLoadData = () => {
          if ("requestIdleCallback" in window) {
            window.requestIdleCallback(() => {
              loadData();
              scheduleKofiWidget();
            }, { timeout: 1200 });
            return;
          }
          window.setTimeout(() => {
            loadData();
            scheduleKofiWidget();
          }, 160);
        };

        if (document.readyState === "complete") {
          runLoadData();
          return;
        }

        window.addEventListener("load", runLoadData, { once: true });
      }

      elements.searchInput.addEventListener("input", handleSearchInputChange);
      elements.creatorFilter.addEventListener("change", resetVisibleAndRender);
      elements.gameFilter.addEventListener("change", resetVisibleAndRender);
      elements.sortSelect.addEventListener("change", resetVisibleAndRender);
      elements.searchPanelToggle.addEventListener("click", () => {
        const isExpanded = elements.searchPanelToggle.getAttribute("aria-expanded") === "true";
        setSearchPanelExpanded(!isExpanded);
      });
      elements.clearButton.addEventListener("click", () => {
        elements.searchInput.value = "";
        elements.creatorFilter.value = "";
        elements.gameFilter.value = "";
        elements.sortSelect.value = "newest";
        clearRandomSelectionState();
        resetVisibleAndRender();
      });
      elements.randomButton.addEventListener("click", pickRandomClip);
      elements.closeSearchButton.addEventListener("click", () => setSearchPanelExpanded(false));
      elements.loadMoreButton.addEventListener("click", () => {
        visibleLimit += MORE_STEP;
        render();
      });

      scheduleDataLoad();
    </script>
    <script>
      const KOFI_WIDGET_SCRIPT_URL = "https://storage.ko-fi.com/cdn/scripts/overlay-widget.js";
      const KOFI_WIDGET_POSITION_CSS = `
        .floatingchat-container-wrap,
        .floatingchat-container {
          left: auto !important;
          right: 18px !important;
          bottom: 18px !important;
          width: 88px !important;
          height: 56px !important;
          max-width: calc(100vw - 28px) !important;
          border-radius: 999px;
          overflow: hidden !important;
          transform-origin: right bottom;
        }

        .floatingchat-container-wrap [class*="donateButton"],
        .floatingchat-container [class*="donateButton"],
        .floatingchat-container-wrap-mobi [class*="donateButton"] {
          min-height: 44px !important;
          border: 1px solid #f2b4ce !important;
          border-radius: 8px !important;
          background: linear-gradient(135deg, #fff6fb 0%, var(--pink-soft) 52%, var(--mint) 100%) !important;
          color: var(--ink) !important;
          box-shadow: var(--shadow) !important;
          font-family: var(--font-cute) !important;
          font-weight: 900 !important;
          letter-spacing: 0 !important;
        }

        .floatingchat-container-wrap [class*="donateButton"]:hover,
        .floatingchat-container [class*="donateButton"]:hover,
        .floatingchat-container-wrap-mobi [class*="donateButton"]:hover {
          border-color: #e86f9f !important;
          background: linear-gradient(135deg, #fff 0%, #ffe7f0 48%, #d4f1ea 100%) !important;
        }

        .floatingchat-container-wrap [class*="donateButton"] img,
        .floatingchat-container [class*="donateButton"] img,
        .floatingchat-container-wrap-mobi [class*="donateButton"] img {
          width: 22px !important;
          height: 22px !important;
          border-radius: 6px !important;
        }

        .floatingchat-container-wrap-mobi {
          left: auto !important;
          right: 18px !important;
          bottom: 18px !important;
          width: 88px !important;
          height: 56px !important;
          border-radius: 999px;
          overflow: hidden !important;
          transform-origin: right bottom;
        }

        .floatingchat-container-mobi {
          width: 88px !important;
          height: 56px !important;
        }

        .floating-chat-kofi-popup-iframe,
        .floating-chat-kofi-popup-iframe-mobi {
          left: auto !important;
          right: 18px !important;
          bottom: 86px !important;
          max-width: calc(100vw - 28px) !important;
        }

        @media (max-width: 620px) {
          body {
            --kofi-mobile-right: max(10px, calc(100vw - 390px));
          }

          .floatingchat-container-wrap,
          .floatingchat-container,
          .floatingchat-container-wrap-mobi {
            left: auto !important;
            right: var(--kofi-mobile-right) !important;
            bottom: 10px !important;
            transform: scale(0.86);
          }

          .floating-chat-kofi-popup-iframe,
          .floating-chat-kofi-popup-iframe-mobi {
            left: auto !important;
            right: var(--kofi-mobile-right) !important;
            bottom: 74px !important;
          }

          .floatingchat-container-wrap .kofi-button-text,
          .floatingchat-container-wrap-mobi .kofi-button-text,
          .floatingchat-container .kofi-button-text,
          .floatingchat-container-wrap [class*="donateButton"] span,
          .floatingchat-container-wrap-mobi [class*="donateButton"] span,
          .floatingchat-container [class*="donateButton"] span {
            display: none !important;
          }
        }
      `;

      function installKofiWidgetStyles() {
        const style = document.getElementById("kofi-widget-position-style") || document.createElement("style");
        style.id = "kofi-widget-position-style";
        style.textContent = KOFI_WIDGET_POSITION_CSS;
        document.head.append(style);
      }

      function drawKofiWidget() {
        try {
          window.kofiWidgetOverlay?.draw?.("jinnymeia", {
            "type": "floating-chat",
            "floating-chat.donateButton.text": " ",
            "floating-chat.donateButton.background-color": "#ffe8f0",
            "floating-chat.donateButton.text-color": "#2c2633",
          });
        } catch (error) {
          // Keep the support widget isolated from the clip search experience.
        } finally {
          window.setTimeout(installKofiWidgetStyles, 0);
        }
      }

      function scheduleKofiWidget() {
        if (document.querySelector(`script[src="${KOFI_WIDGET_SCRIPT_URL}"]`)) return;
        installKofiWidgetStyles();
        const script = document.createElement("script");
        script.src = KOFI_WIDGET_SCRIPT_URL;
        script.async = true;
        script.addEventListener("load", drawKofiWidget, { once: true });
        script.addEventListener("error", installKofiWidgetStyles, { once: true });
        document.body.append(script);
      }
    </script>
  </body>
</html>
