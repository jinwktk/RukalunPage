    <style>
      :root {
        color-scheme: light;
        --bg: #fff8fb;
        --paper: #ffffff;
        --ink: #30283a;
        --muted: #756b7f;
        --line: #eadde8;
        --pink: #e86f9f;
        --pink-soft: #ffe7f0;
        --mint: #dff7ed;
        --mint-ink: #26796f;
        --sky: #e8f5ff;
        --sky-ink: #356ba3;
        --lemon: #fff4c9;
        --lavender: #efe9ff;
        --shadow: 0 14px 36px rgba(88, 55, 88, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(255, 231, 240, 0.85) 0 18%, transparent 18% 100%),
          linear-gradient(180deg, #fffdf8 0, var(--bg) 540px, #f6fbff 100%);
        color: var(--ink);
        font-family:
          "Segoe UI",
          "Hiragino Kaku Gothic ProN",
          "Yu Gothic",
          system-ui,
          sans-serif;
        line-height: 1.65;
      }

      a {
        color: var(--sky-ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .wrap {
        width: min(1120px, calc(100% - 28px));
        margin: 0 auto;
      }

      .topbar {
        border-bottom: 1px solid rgba(234, 221, 232, 0.86);
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(10px);
      }

      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 16px;
        min-height: 58px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--ink);
        font-weight: 900;
        text-decoration: none;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid #f2b4ce;
        border-radius: 8px;
        background: var(--pink-soft);
        overflow: hidden;
      }

      .brand-icon {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .top-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .top-links a {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        padding: 7px 10px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 800;
        text-decoration: none;
      }

      .hero {
        position: relative;
        display: grid;
        min-height: clamp(340px, 43vw, 500px);
        align-items: center;
        overflow: hidden;
        isolation: isolate;
        border-bottom: 1px solid rgba(234, 221, 232, 0.86);
        background: #fff8fb;
      }

      .hero::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(255, 253, 248, 0.96) 0%, rgba(255, 253, 248, 0.86) 42%, rgba(255, 248, 251, 0.42) 68%, rgba(232, 245, 255, 0.22) 100%),
          linear-gradient(180deg, rgba(255, 248, 251, 0.18), rgba(255, 253, 248, 0.72));
        content: "";
      }

      .hero-image {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .hero-content {
        padding: clamp(42px, 7vw, 76px) 0;
      }

      .hero-copy {
        max-width: 690px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #f1c2d7;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        padding: 5px 12px;
        color: #a94a77;
        font-size: 0.9rem;
        font-weight: 900;
      }

      .eyebrow-icon {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        max-width: 720px;
        margin-top: 14px;
        font-size: clamp(2.1rem, 5vw, 4rem);
        line-height: 1.12;
      }

      .title-phrase {
        white-space: nowrap;
      }

      .lead {
        max-width: 760px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .search-panel {
        position: sticky;
        top: 0;
        z-index: 5;
        border-top: 1px solid rgba(234, 221, 232, 0.7);
        border-bottom: 1px solid rgba(234, 221, 232, 0.9);
        background: rgba(255, 248, 251, 0.9);
        backdrop-filter: blur(10px);
      }

      .search-toggle-wrap {
        display: none;
      }

      .search-toggle {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 24px;
        align-items: center;
        column-gap: 10px;
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        padding: 9px 12px;
        text-align: left;
        box-shadow: 0 10px 22px rgba(88, 55, 88, 0.06);
      }

      .search-toggle-copy {
        display: grid;
        min-width: 0;
        gap: 2px;
      }

      .search-toggle-label {
        font-size: 0.95rem;
        font-weight: 900;
      }

      .search-toggle-summary {
        min-width: 0;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .search-toggle-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        color: #b63d74;
        font-size: 0.95rem;
        font-weight: 900;
        line-height: 1;
        transition: transform 0.18s ease;
      }

      .search-toggle[aria-expanded="true"] .search-toggle-icon {
        transform: rotate(180deg);
      }

      .search-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 190px 170px auto;
        gap: 10px;
        align-items: end;
        padding: 14px 0;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      label {
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 900;
      }

      input,
      select {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        outline: none;
        padding: 10px 12px;
      }

      input:focus,
      select:focus,
      button:focus-visible,
      a:focus-visible {
        outline: 3px solid rgba(232, 111, 159, 0.3);
        outline-offset: 2px;
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        padding: 10px 12px;
        font-weight: 900;
      }

      .button.primary {
        border-color: #d94f89;
        background: var(--pink);
        color: #fff;
      }

      .button-icon {
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        object-fit: contain;
      }

      main {
        padding: 24px 0 56px;
      }

      .status-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .status {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--paper);
        padding: 5px 10px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 800;
      }

      .pill.mint {
        border-color: #b9e8d9;
        background: var(--mint);
        color: var(--mint-ink);
      }

      .notice {
        border: 1px solid #f1d6a2;
        border-radius: 8px;
        background: var(--lemon);
        padding: 12px;
        color: #735600;
        font-weight: 800;
      }

      .clip-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .clip-actions > * {
        flex: 1 1 128px;
      }

      .results {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .clip-card {
        display: grid;
        min-height: 214px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.86)),
          var(--paper);
        box-shadow: 0 12px 28px rgba(88, 55, 88, 0.08);
        overflow: hidden;
      }

      .clip-thumbnail {
        position: relative;
        display: grid;
        aspect-ratio: 16 / 9;
        min-height: 0;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(255, 231, 240, 0.88), rgba(232, 245, 255, 0.9)),
          var(--paper);
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 900;
        overflow: hidden;
      }

      .clip-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .clip-thumbnail-placeholder {
        padding: 10px;
        text-align: center;
      }

      .clip-card:nth-child(4n + 1) .clip-ribbon {
        background: var(--pink-soft);
        color: #a43c70;
      }

      .clip-card:nth-child(4n + 2) .clip-ribbon {
        background: var(--mint);
        color: var(--mint-ink);
      }

      .clip-card:nth-child(4n + 3) .clip-ribbon {
        background: var(--sky);
        color: var(--sky-ink);
      }

      .clip-card:nth-child(4n + 4) .clip-ribbon {
        background: var(--lavender);
        color: #6851a8;
      }

      .clip-ribbon {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 42px;
        padding: 8px 12px;
        font-size: 0.86rem;
        font-weight: 900;
      }

      .clip-ribbon-main {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        gap: 6px;
      }

      .new-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 42px;
        min-height: 22px;
        border: 1px solid rgba(217, 79, 137, 0.3);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: #b63d74;
        padding: 2px 7px;
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1;
      }

      .clip-card-body {
        display: grid;
        gap: 12px;
        padding: 13px;
      }

      .clip-title {
        display: -webkit-box;
        min-height: 3.1em;
        overflow: hidden;
        font-size: 1.02rem;
        font-weight: 900;
        line-height: 1.55;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .clip-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .meta-chip {
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        padding: 4px 8px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .clip-link,
      .clip-favorite-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 40px;
        border: 1px solid #d94f89;
        border-radius: 8px;
        background: #fff5f9;
        color: #b63d74;
        padding: 8px 10px;
        font-weight: 900;
        text-decoration: none;
      }

      .clip-favorite-button {
        border-color: #d9bf57;
        background: var(--lemon);
        color: #705200;
      }

      .clip-favorite-button[aria-pressed="true"] {
        border-color: #e86f9f;
        background: var(--pink-soft);
        color: #a43c70;
      }

      .clip-card.is-favorite {
        border-color: #f2b4ce;
        box-shadow: 0 14px 30px rgba(232, 111, 159, 0.14);
      }

      .empty {
        display: none;
        border: 1px dashed #ddb8ce;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        padding: 22px;
        text-align: center;
      }

      .empty.is-visible {
        display: block;
      }

      .load-more-wrap {
        display: none;
        justify-content: center;
        margin-top: 18px;
      }

      .load-more-wrap.is-visible {
        display: flex;
      }

      .footer-note {
        margin-top: 34px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 900px) {
        .hero::after {
          background:
            linear-gradient(180deg, rgba(255, 253, 248, 0.94) 0%, rgba(255, 248, 251, 0.86) 58%, rgba(232, 245, 255, 0.34) 100%),
            linear-gradient(90deg, rgba(255, 253, 248, 0.9), rgba(255, 248, 251, 0.42));
        }

        .search-grid {
          grid-template-columns: 1fr 1fr;
        }

        .button-row {
          grid-column: 1 / -1;
        }

        .results {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .topbar-inner,
        .status-row {
          align-items: flex-start;
          grid-template-columns: 1fr;
        }

        .topbar-inner {
          flex-direction: column;
          padding: 12px 0;
        }

        .search-grid,
        .results {
          grid-template-columns: 1fr;
        }

        .search-toggle-wrap {
          display: block;
          padding: 10px 0;
        }

        .search-panel.is-collapsed .search-grid {
          display: none;
        }

        .search-grid {
          padding: 0 0 14px;
        }

        h1 {
          font-size: 2.25rem;
        }

        .hero {
          min-height: 330px;
        }

        .hero-content {
          padding: 34px 0;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <a class="brand" href="./clip-search.html" aria-label="るっかるん Clip検索">
          <span class="brand-mark" aria-hidden="true">
            <img class="brand-icon" src="./assets/rukalun/Hi-112px.png" width="34" height="34" alt="" decoding="async" />
          </span>
          <span>るっかるん Clip検索</span>
        </a>
      </div>
    </header>

    <section class="hero" aria-labelledby="pageTitle">
      <img
        class="hero-image"
        src="./assets/rukalun/clip-search-hero.png"
        width="1600"
        height="900"
        alt=""
        decoding="async"
      />
      <div class="wrap hero-content">
        <div class="hero-copy">
          <span class="eyebrow">
            <img class="eyebrow-icon" src="./assets/rukalun/プレゼント-112px.png" width="24" height="24" alt="" decoding="async" />
            Rukalun Clip Library
          </span>
          <h1 id="pageTitle">かわいい瞬間を、<span class="title-phrase">ふわっと探す。</span></h1>
          <p class="lead">
            るっかるんの配信で生まれたClipを、タイトル、作成者名、ゲーム名から探せます。
            見たい言葉を入れて、気になるClipを開いてください。
          </p>
        </div>
      </div>
    </section>

    <section id="searchPanel" class="search-panel is-collapsed" aria-label="Clip検索">
      <div class="wrap search-toggle-wrap">
        <button
          id="searchPanelToggle"
          class="search-toggle"
          type="button"
          aria-controls="searchControls"
          aria-expanded="false"
        >
          <span class="search-toggle-copy">
            <span id="searchPanelToggleLabel" class="search-toggle-label">検索条件を開く</span>
            <span id="searchPanelSummary" class="search-toggle-summary">検索条件を確認中</span>
          </span>
          <span class="search-toggle-icon" aria-hidden="true">▽</span>
        </button>
      </div>
      <div id="searchControls" class="wrap search-grid">
        <div class="field">
          <label for="searchInput">キーワード</label>
          <input id="searchInput" type="search" placeholder="例: FF14 / 雑談 / 迷子 / 作成者名" autocomplete="off" />
        </div>
        <div class="field">
          <label for="creatorFilter">作成者</label>
          <select id="creatorFilter">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="field">
          <label for="sortSelect">並び替え</label>
          <select id="sortSelect">
            <option value="newest">新しい順</option>
            <option value="oldest">古い順</option>
            <option value="favorites">お気に入り順</option>
            <option value="views">再生数順</option>
            <option value="title">タイトル順</option>
          </select>
        </div>
        <div class="button-row">
          <button id="randomButton" class="button primary" type="button">
            <img class="button-icon" src="./assets/rukalun/bikkuri-112px.png" width="24" height="24" alt="" decoding="async" />
            おまかせ
          </button>
          <button id="clearButton" class="button" type="button">
            <img class="button-icon" src="./assets/rukalun/Hi-112px.png" width="24" height="24" alt="" decoding="async" />
            クリア
          </button>
        </div>
      </div>
    </section>

    <main class="wrap">
      <div class="status-row">
        <div class="status" aria-live="polite">
          <span id="resultCount" class="pill mint">読み込み中</span>
          <span id="updatedAt" class="pill">更新日時を確認中</span>
          <span id="clipSyncedAt" class="pill">Clip最終同期を確認中</span>
        </div>
      </div>

      <div id="notice" class="notice" hidden></div>
      <section id="emptyState" class="empty">
        <h2>見つかりませんでした</h2>
        <p>検索語を短くするか、作成者の絞り込みを外してください。</p>
      </section>

      <section id="results" class="results" aria-label="検索結果"></section>

      <div id="loadMoreWrap" class="load-more-wrap">
        <button id="loadMoreButton" class="button" type="button">
          <img class="button-icon" src="./assets/rukalun/プレゼント-112px.png" width="24" height="24" alt="" decoding="async" />
          もっと見る
        </button>
      </div>

    </main>

    <script>
      const DATA_URL = "clip-search-data.json";
      const CLIP_FAVORITES_STORAGE_KEY = "rukalun.clipSearch.favorites.v1";
      const RUKALUN_ICON_PATHS = {
        hi: "./assets/rukalun/Hi-112px.png",
        gift: "./assets/rukalun/プレゼント-112px.png",
        surprise: "./assets/rukalun/bikkuri-112px.png",
      };
      const INITIAL_LIMIT = 48;
      const MORE_STEP = 48;
      const NEW_CLIP_WINDOW_MS = 3 * 24 * 60 * 60 * 1000;

      const elements = {
        searchPanel: document.querySelector("#searchPanel"),
        searchPanelToggle: document.querySelector("#searchPanelToggle"),
        searchPanelToggleLabel: document.querySelector("#searchPanelToggleLabel"),
        searchPanelSummary: document.querySelector("#searchPanelSummary"),
        searchInput: document.querySelector("#searchInput"),
        creatorFilter: document.querySelector("#creatorFilter"),
        sortSelect: document.querySelector("#sortSelect"),
        randomButton: document.querySelector("#randomButton"),
        clearButton: document.querySelector("#clearButton"),
        loadMoreButton: document.querySelector("#loadMoreButton"),
        loadMoreWrap: document.querySelector("#loadMoreWrap"),
        results: document.querySelector("#results"),
        emptyState: document.querySelector("#emptyState"),
        resultCount: document.querySelector("#resultCount"),
        updatedAt: document.querySelector("#updatedAt"),
        clipSyncedAt: document.querySelector("#clipSyncedAt"),
        notice: document.querySelector("#notice"),
      };

      const initialQuery = new URLSearchParams(window.location.search).get("q");
      if (initialQuery) {
        elements.searchInput.value = initialQuery;
      }

      let allClips = [];
      let filteredClips = [];
      let visibleLimit = INITIAL_LIMIT;
      let favoriteClips = loadFavoriteClips();

      function normalizeText(value) {
        return String(value ?? "")
          .normalize("NFKC")
          .toLocaleLowerCase("ja-JP")
          .trim()
          .replace(/\s+/g, " ");
      }

      function formatDate(value) {
        if (!value) return "日付不明";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "日付不明";
        return new Intl.DateTimeFormat("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(date);
      }

      function formatDateTimeWithSeconds(value) {
        if (!value) return "日時不明";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "日時不明";
        const parts = new Intl.DateTimeFormat("ja-JP", {
          timeZone: "Asia/Tokyo",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        })
          .formatToParts(date)
          .reduce((acc, part) => {
            acc[part.type] = part.value;
            return acc;
          }, {});
        return `${parts.year}/${parts.month}/${parts.day} ${parts.hour}:${parts.minute}:${parts.second} JST`;
      }

      function formatViews(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) return "再生数不明";
        return `${value.toLocaleString("ja-JP")} views`;
      }

      function isNewClip(clip) {
        const createdAt = new Date(clip?.createdAt ?? "").getTime();
        if (!Number.isFinite(createdAt)) return false;
        const ageMs = Date.now() - createdAt;
        return ageMs >= 0 && ageMs < NEW_CLIP_WINDOW_MS;
      }

      function loadFavoriteClips() {
        try {
          const raw = localStorage.getItem(CLIP_FAVORITES_STORAGE_KEY);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};

          return Object.fromEntries(
            Object.entries(parsed).filter((entry) => typeof entry[0] === "string" && Number.isFinite(entry[1]))
          );
        } catch {
          return {};
        }
      }

      function saveFavoriteClips() {
        try {
          localStorage.setItem(CLIP_FAVORITES_STORAGE_KEY, JSON.stringify(favoriteClips));
        } catch {
          setNotice("お気に入りをブラウザに保存できませんでした。");
        }
      }

      function isFavoriteClip(clip) {
        return Boolean(clip?.id && favoriteClips[clip.id]);
      }

      function toggleFavoriteClip(clip) {
        if (!clip?.id) return;
        if (isFavoriteClip(clip)) {
          delete favoriteClips[clip.id];
        } else {
          favoriteClips[clip.id] = Date.now();
        }
        saveFavoriteClips();
        render();
      }

      function isSafeTwitchClipUrl(url) {
        try {
          const parsed = new URL(url);
          return (
            parsed.protocol === "https:" &&
            (parsed.hostname === "www.twitch.tv" || parsed.hostname === "clips.twitch.tv")
          );
        } catch {
          return false;
        }
      }

      function isSafeImageUrl(url) {
        try {
          const parsed = new URL(url);
          return parsed.protocol === "https:";
        } catch {
          return false;
        }
      }

      function setNotice(message) {
        if (!message) {
          elements.notice.hidden = true;
          elements.notice.textContent = "";
          return;
        }
        elements.notice.hidden = false;
        elements.notice.textContent = message;
      }

      function createButtonIcon(src) {
        const icon = document.createElement("img");
        icon.className = "button-icon";
        icon.src = src;
        icon.alt = "";
        icon.width = 24;
        icon.height = 24;
        icon.decoding = "async";
        return icon;
      }

      function setIconText(element, iconSrc, label) {
        element.replaceChildren(createButtonIcon(iconSrc), document.createTextNode(label));
      }

      function buildCreatorOptions(clips) {
        const creators = [...new Set(clips.map((clip) => clip.creator).filter(Boolean))].sort((a, b) =>
          a.localeCompare(b, "ja-JP")
        );
        for (const creator of creators) {
          const option = document.createElement("option");
          option.value = creator;
          option.textContent = creator;
          elements.creatorFilter.append(option);
        }
      }

      function sortClips(clips) {
        const sort = elements.sortSelect.value;
        return [...clips].sort((a, b) => {
          if (sort === "oldest") {
            return compareCreatedAtAsc(a, b);
          }
          if (sort === "favorites") {
            const favoriteDiff = Number(isFavoriteClip(b)) - Number(isFavoriteClip(a));
            if (favoriteDiff !== 0) return favoriteDiff;
            const favoriteTimeDiff = (favoriteClips[b.id] ?? 0) - (favoriteClips[a.id] ?? 0);
            if (favoriteTimeDiff !== 0) return favoriteTimeDiff;
            return compareCreatedAtDesc(a, b);
          }
          if (sort === "views") {
            return (b.views ?? -1) - (a.views ?? -1) || compareCreatedAtDesc(a, b);
          }
          if (sort === "title") {
            return a.title.localeCompare(b.title, "ja-JP") || compareCreatedAtDesc(a, b);
          }
          return compareCreatedAtDesc(a, b);
        });
      }

      function compareCreatedAtDesc(a, b) {
        return String(b.createdAt ?? "").localeCompare(String(a.createdAt ?? "")) || a.id.localeCompare(b.id);
      }

      function compareCreatedAtAsc(a, b) {
        return String(a.createdAt ?? "").localeCompare(String(b.createdAt ?? "")) || a.id.localeCompare(b.id);
      }

      function filterClips() {
        const query = normalizeText(elements.searchInput.value);
        const terms = query ? query.split(" ") : [];
        const creator = elements.creatorFilter.value;

        filteredClips = sortClips(
          allClips.filter((clip) => {
            if (creator && clip.creator !== creator) return false;
            if (terms.length === 0) return true;

            return terms.every((term) => clip.searchText.includes(term));
          })
        );
      }

      function getSelectedSortLabel() {
        const selected = elements.sortSelect.options[elements.sortSelect.selectedIndex];
        return selected?.textContent?.trim() || "新しい順";
      }

      function updateSearchPanelSummary() {
        const query = elements.searchInput.value.trim();
        const creator = elements.creatorFilter.value || "すべて";
        const queryLabel = query ? `検索: ${query}` : "検索なし";
        elements.searchPanelSummary.textContent = `${queryLabel} / ${creator} / ${getSelectedSortLabel()}`;
      }

      function setSearchPanelExpanded(expanded) {
        elements.searchPanel.classList.toggle("is-collapsed", !expanded);
        elements.searchPanelToggle.setAttribute("aria-expanded", String(expanded));
        elements.searchPanelToggleLabel.textContent = expanded ? "検索条件を閉じる" : "検索条件を開く";
      }

      function renderCard(clip) {
        const card = document.createElement("article");
        card.className = "clip-card";
        card.classList.toggle("is-favorite", isFavoriteClip(clip));

        const ribbon = document.createElement("div");
        ribbon.className = "clip-ribbon";
        const ribbonMain = document.createElement("span");
        ribbonMain.className = "clip-ribbon-main";
        const date = document.createElement("span");
        date.textContent = formatDate(clip.createdAt);
        ribbonMain.append(date);
        if (isNewClip(clip)) {
          const newBadge = document.createElement("span");
          newBadge.className = "new-badge";
          newBadge.setAttribute("aria-label", "新着Clip");
          newBadge.textContent = "NEW";
          ribbonMain.append(newBadge);
        }
        const views = document.createElement("span");
        views.textContent = formatViews(clip.views);
        ribbon.append(ribbonMain, views);

        const thumbnail = document.createElement("div");
        thumbnail.className = "clip-thumbnail";
        if (isSafeImageUrl(clip.thumbnailUrl)) {
          const image = document.createElement("img");
          image.src = clip.thumbnailUrl;
          image.alt = clip.title ? `${clip.title}のサムネイル` : "Clipサムネイル";
          image.loading = "lazy";
          image.decoding = "async";
          image.addEventListener("error", () => {
            thumbnail.replaceChildren();
            const placeholder = document.createElement("span");
            placeholder.className = "clip-thumbnail-placeholder";
            placeholder.textContent = "サムネイル準備中";
            thumbnail.append(placeholder);
          });
          thumbnail.append(image);
        } else {
          const placeholder = document.createElement("span");
          placeholder.className = "clip-thumbnail-placeholder";
          placeholder.textContent = "サムネイル準備中";
          thumbnail.append(placeholder);
        }

        const body = document.createElement("div");
        body.className = "clip-card-body";

        const title = document.createElement("h2");
        title.className = "clip-title";
        title.textContent = clip.title || "無題のClip";

        const meta = document.createElement("div");
        meta.className = "clip-meta";
        const creator = document.createElement("span");
        creator.className = "meta-chip";
        creator.textContent = clip.creator ? `作成: ${clip.creator}` : "作成者不明";
        const game = document.createElement("span");
        game.className = "meta-chip";
        game.textContent = clip.gameName ? `ゲーム: ${clip.gameName}` : "ゲーム不明";
        meta.append(game, creator);

        const actions = document.createElement("div");
        actions.className = "clip-actions";

        const favoriteButton = document.createElement("button");
        favoriteButton.className = "clip-favorite-button";
        favoriteButton.type = "button";
        const favoriteLabel = isFavoriteClip(clip) ? "お気に入り済み" : "お気に入りに追加";
        favoriteButton.setAttribute("aria-pressed", String(isFavoriteClip(clip)));
        favoriteButton.setAttribute("aria-label", favoriteLabel);
        setIconText(favoriteButton, RUKALUN_ICON_PATHS.gift, favoriteLabel);
        favoriteButton.addEventListener("click", () => toggleFavoriteClip(clip));

        const link = document.createElement("a");
        link.className = "clip-link";
        link.target = "_blank";
        link.rel = "noreferrer";
        link.href = isSafeTwitchClipUrl(clip.url) ? clip.url : "https://www.twitch.tv/rukalun";
        setIconText(link, RUKALUN_ICON_PATHS.hi, "Twitchで見る");

        actions.append(favoriteButton, link);
        body.append(title, meta, actions);
        card.append(ribbon, thumbnail, body);
        return card;
      }

      function render() {
        updateSearchPanelSummary();
        filterClips();
        const visible = filteredClips.slice(0, visibleLimit);

        elements.results.replaceChildren(...visible.map(renderCard));
        elements.emptyState.classList.toggle("is-visible", filteredClips.length === 0);
        elements.loadMoreWrap.classList.toggle("is-visible", filteredClips.length > visibleLimit);
        elements.resultCount.textContent = `${filteredClips.length.toLocaleString("ja-JP")} / ${allClips.length.toLocaleString("ja-JP")} clips`;
      }

      function resetVisibleAndRender() {
        visibleLimit = INITIAL_LIMIT;
        render();
      }

      function pickRandomClip() {
        filterClips();
        if (filteredClips.length === 0) {
          render();
          return;
        }
        const clip = filteredClips[Math.floor(Math.random() * filteredClips.length)];
        elements.searchInput.value = clip.title;
        elements.creatorFilter.value = "";
        visibleLimit = INITIAL_LIMIT;
        render();
        elements.results.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      async function loadData() {
        try {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          allClips = Array.isArray(data.clips)
            ? data.clips.map((clip) => ({
                ...clip,
                searchText: normalizeText(`${clip.title} ${clip.creator} ${clip.gameName}`),
              }))
            : [];
          buildCreatorOptions(allClips);
          elements.updatedAt.textContent = data.generatedAt
            ? `JSON生成: ${formatDateTimeWithSeconds(data.generatedAt)}`
            : "JSON生成: 未記録";
          const recentSyncedAt = data.clipSync?.recentSyncedAt ?? null;
          elements.clipSyncedAt.textContent = recentSyncedAt
            ? `Clip最終同期: ${formatDateTimeWithSeconds(recentSyncedAt)}`
            : "Clip最終同期: 未記録";
          setNotice(allClips.length === 0 ? "Clipデータがまだありません。しばらくしてから再読み込みしてください。" : "");
          render();
        } catch (error) {
          allClips = [];
          filteredClips = [];
          elements.resultCount.textContent = "読み込み失敗";
          elements.updatedAt.textContent = "JSON生成: 未記録";
          elements.clipSyncedAt.textContent = "Clip最終同期: 未記録";
          setNotice("Clipデータを読み込めませんでした。しばらくしてから再読み込みしてください。");
          render();
        }
      }

      elements.searchInput.addEventListener("input", resetVisibleAndRender);
      elements.creatorFilter.addEventListener("change", resetVisibleAndRender);
      elements.sortSelect.addEventListener("change", resetVisibleAndRender);
      elements.searchPanelToggle.addEventListener("click", () => {
        const isExpanded = elements.searchPanelToggle.getAttribute("aria-expanded") === "true";
        setSearchPanelExpanded(!isExpanded);
      });
      elements.clearButton.addEventListener("click", () => {
        elements.searchInput.value = "";
        elements.creatorFilter.value = "";
        elements.sortSelect.value = "newest";
        resetVisibleAndRender();
      });
      elements.randomButton.addEventListener("click", pickRandomClip);
      elements.loadMoreButton.addEventListener("click", () => {
        visibleLimit += MORE_STEP;
        render();
      });

      loadData();
    </script>
  </body>
</html>
